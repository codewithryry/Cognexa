<body style="margin: 0; padding: 0; background: #f3f4f6;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background: #f3f4f6; padding: 32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width: 480px; width: 100%; background: #ffffff; border-radius: 12px; overflow: hidden; font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;">
          <tr>
            <td style="background: linear-gradient(90deg, #4f46e5, #c026d3); padding: 20px 32px;">
              <span style="color: #ffffff; font-size: 18px; font-weight: 700; letter-spacing: 0.2px;">Cognexa</span>
            </td>
          </tr>
          <tr>
            <td style="padding: 32px;">
              <p style="color: #1f2937; font-size: 16px; line-height: 1.6; margin: 0 0 16px;">Hi {{name}},</p>
              <p style="color: #4b5563; font-size: 14px; line-height: 1.6; margin: 0 0 16px;">{{detail}}</p>
              <p style="color: #4b5563; font-size: 14px; line-height: 1.6; margin: 0;">
                If this was you, no action is needed. If you don't recognize this activity, change your
                Cognexa password immediately.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding: 16px 32px 24px; border-top: 1px solid #e5e7eb;">
              <p style="color: #9ca3af; font-size: 12px; line-height: 1.5; margin: 16px 0 0;">
                This is an automated security notification from Cognexa.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
