<body style="margin: 0; padding: 0; background: #ffffff;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background: #ffffff;">
    <tr>
      <td align="center" style="padding: 40px 24px;">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width: 480px; width: 100%; font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;">
          <tr>
            <td style="padding-bottom: 32px;">
              <span style="color: #111827; font-size: 16px; font-weight: 700;">Cognexa</span>
            </td>
          </tr>
          <tr>
            <td style="color: #1f2937; font-size: 14px; line-height: 1.6; padding-bottom: 16px;">
              Hi {{name}},
            </td>
          </tr>
          <tr>
            <td style="color: #4b5563; font-size: 14px; line-height: 1.6; padding-bottom: 16px;">
              {{detail}}
            </td>
          </tr>
          <tr>
            <td style="color: #4b5563; font-size: 14px; line-height: 1.6; padding-bottom: 32px;">
              If this was you, no action is needed. If you don't recognize this activity, change your Cognexa password immediately.
            </td>
          </tr>
          <tr>
            <td style="color: #9ca3af; font-size: 12px; line-height: 1.5; padding-top: 16px; border-top: 1px solid #e5e7eb;">
              This is an automated security notification from Cognexa.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
